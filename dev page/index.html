<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.2;
            overflow-x: auto;
            min-height: 100vh;
        }
        pre {
            margin: 0;
            white-space: pre;
            overflow-x: auto;
            word-wrap: normal;
            overflow-wrap: normal;
        }
        .char{display:inline-block;animation:stutter 3s infinite}@keyframes stutter{0%,90%,100%{opacity:1;transform:translateX(0)}92%{opacity:0.8;transform:translateX(-0.5px)}94%{opacity:0.9;transform:translateX(0.5px)}96%{opacity:0.7;transform:translateX(-0.3px)}98%{opacity:0.95;transform:translateX(0.3px)}}
    </style>
</head>
<body>
    <pre id="ascii-art">ily.</pre>
    
    <script>
        async function loadAsciiArt(){
            try{const r=await fetch('ascii-art.txt'),t=await r.text();
                document.getElementById('ascii-art').innerHTML=t.split('').map(c=>c==='\n'?'\n':`<span class="char" style="animation-delay:${Math.random()*3}s">${c}</span>`).join('')
            }catch(e){
                console.error('Error loading ASCII art:',e);
                document.getElementById('ascii-art').textContent='Error loading ASCII art file.'
            }
        }
        loadAsciiArt();
    </script>
</body>
</html>
